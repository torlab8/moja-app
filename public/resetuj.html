<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetuj Hasło</title>
    <link rel="stylesheet" href="resetuj.css">
</head>
<body>
    <img class="bg-image" src="zarejstruj.png" alt="">
    <div class="form-wrapper">
        <form class="form">
            <p id="heading">Resetuj hasło</p>
            
            <div class="field" id="emailBox">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.106 7.222c0-2.967-2.249-5.032-5.482-5.032-3.35 0-5.646 2.318-5.646 5.702 0 3.493 2.235 5.708 5.762 5.708.862 0 1.689-.123 2.304-.335v-.862c-.43.199-1.354.328-2.29.328-2.926 0-4.813-1.88-4.813-4.798 0-2.844 1.921-4.881 4.594-4.881 2.735 0 4.608 1.688 4.608 4.156 0 1.682-.554 2.769-1.416 2.769-.492 0-.772-.28-.772-.76V5.206H8.923v.834h-.11c-.266-.595-.881-.964-1.6-.964-1.4 0-2.378 1.162-2.378 2.823 0 1.737.957 2.906 2.379 2.906.8 0 1.415-.39 1.709-1.087h.11c.081.67.703 1.148 1.503 1.148 1.572 0 2.57-1.415 2.57-3.643zm-7.177.704c0-1.197.54-1.907 1.456-1.907.93 0 1.524.738 1.524 1.907S8.308 9.84 7.371 9.84c-.895 0-1.442-.725-1.442-1.914z"></path>
                </svg>
                <input id="emailInput" autocomplete="off" placeholder="Adres e-mail" class="input-field" type="email">
            </div>
            
            <div id="error-message" class="error-text"></div>

            <button class="button3" id="sendButton" type="button" onclick="wyslijZWalidacja()">Wyślij kod</button>

            <div class="kod-sekcja" id="kodSekcja">
                
                <div class="tekst">Podaj nowe hasło</div>
                <div class="field" id="field-newpass">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
                    </svg>
                    <input id="newPassword" placeholder="Twoje nowe hasło (min. 6 znaków)" class="input-field" type="password">
                </div>

                <div class="tekst" style="margin-top: 10px;">Wpisz kod, który otrzymałeś na maila</div>
                <div class="code-field">
                    <input class="code-input" maxlength="1" type="text">
                    <input class="code-input" maxlength="1" type="text">
                    <input class="code-input" maxlength="1" type="text">
                    <input class="code-input" maxlength="1" type="text">
                    <input class="code-input" maxlength="1" type="text">
                </div>

                <div id="reset-error" class="error-text"></div>
                
                <button class="button4" type="button" id="resetBtn" onclick="zatwierdz()">Zatwierdź i resetuj</button>
            </div>

            <div style="text-align:center; margin-top: 10px;">
                <a href="index.html" style="color:#888; font-size:0.8em; text-decoration:none;">← Wróć do logowania</a>
            </div>
        </form>
    </div>

    <script>
        let pendingEmail = '';

        async function wyslijZWalidacja() {
            const emailInput = document.getElementById('emailInput');
            const errorMsg = document.getElementById('error-message');
            const btn = document.getElementById('sendButton');
            const emailValue = emailInput.value.trim();

            errorMsg.textContent = '';

            if (emailValue === '') {
                errorMsg.textContent = 'Proszę podać adres email.';
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailValue)) {
                errorMsg.textContent = 'Podaj prawidłowy adres email.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Wysyłanie...';

            try {
                const res = await fetch('/api/reset/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailValue })
                });
                const data = await res.json();

                if (res.ok) {
                    pendingEmail = emailValue;
                    emailInput.disabled = true;
                    document.getElementById('emailBox').style.opacity = '0.6';
                    btn.style.display = 'none';

                    const sekcja = document.getElementById('kodSekcja');
                    sekcja.classList.add('widoczny');
                    
                    setupCodeInputs();
                    document.getElementById('newPassword').focus();
                } else {
                    errorMsg.textContent = data.error || 'Błąd serwera';
                    btn.textContent = 'Wyślij kod';
                    btn.disabled = false;
                }
            } catch {
                errorMsg.textContent = 'Błąd połączenia z serwerem';
                btn.textContent = 'Wyślij kod';
                btn.disabled = false;
            }
        }

        function setupCodeInputs() {
            const inputs = document.querySelectorAll('.code-input');
            inputs.forEach((input, i) => {
                input.addEventListener('input', () => {
                    input.value = input.value.replace(/\D/g, '');
                    if (input.value.length === 1 && i < inputs.length - 1) inputs[i + 1].focus();
                });
                input.addEventListener('keydown', e => {
                    if (e.key === 'Backspace' && input.value === '' && i > 0) inputs[i - 1].focus();
                });
            });
        }

        async function zatwierdz() {
            const newPassword = document.getElementById('newPassword').value;
            const inputs = document.querySelectorAll('.code-input');
            const errorEl = document.getElementById('reset-error');
            const btn = document.getElementById('resetBtn');

            errorEl.textContent = '';

            if (newPassword.length < 6) {
                errorEl.textContent = 'Hasło musi mieć min. 6 znaków!';
                document.getElementById('field-newpass').style.boxShadow = 'inset 2px 5px 10px rgb(5,5,5), 0 0 0 1.5px #e05555';
                return;
            }
            document.getElementById('field-newpass').style.boxShadow = '';

            let pelny = true;
            inputs.forEach(input => { if (!input.value.trim()) pelny = false; });
            if (!pelny) {
                errorEl.textContent = 'Wpisz pełny kod weryfikacyjny!';
                return;
            }

            const code = Array.from(inputs).map(i => i.value).join('');

            btn.disabled = true;
            btn.textContent = 'Resetowanie...';

            try {
                const res = await fetch('/api/reset/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code, newPassword })
                });
                const data = await res.json();

                if (res.ok) {
                    btn.textContent = '✓ Hasło zmienione!';
                    btn.style.backgroundColor = '#2ecc71';
                    setTimeout(() => {
                        alert('✅ Hasło zostało zmienione! Możesz się teraz zalogować.');
                        window.location.href = 'index.html';
                    }, 300);
                } else {
                    errorEl.textContent = data.error || 'Błąd weryfikacji';
                    btn.textContent = 'Zatwierdź i resetuj';
                    btn.disabled = false;
                }
            } catch {
                errorEl.textContent = 'Błąd połączenia z serwerem';
                btn.textContent = 'Zatwierdź i resetuj';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
