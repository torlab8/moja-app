<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Logowanie</title>
</head>
<body>
    <img class="bg-image" src="tapeta.png" alt="tło">
    
    <div class="form-wrapper">
        <form class="form" id="loginForm">
            <p id="heading">Witaj ponownie</p>

            <div class="field" id="field-email">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.106 7.222c0-2.967-2.249-5.032-5.482-5.032-3.35 0-5.646 2.318-5.646 5.702 0 3.493 2.235 5.708 5.762 5.708.862 0 1.689-.123 2.304-.335v-.862c-.43.199-1.354.328-2.29.328-2.926 0-4.813-1.88-4.813-4.798 0-2.844 1.921-4.881 4.594-4.881 2.735 0 4.608 1.688 4.608 4.156 0 1.682-.554 2.769-1.416 2.769-.492 0-.772-.28-.772-.76V5.206H8.923v.834h-.11c-.266-.595-.881-.964-1.6-.964-1.4 0-2.378 1.162-2.378 2.823 0 1.737.957 2.906 2.379 2.906.8 0 1.415-.39 1.709-1.087h.11c.081.67.703 1.148 1.503 1.148 1.572 0 2.57-1.415 2.57-3.643zm-7.177.704c0-1.197.54-1.907 1.456-1.907.93 0 1.524.738 1.524 1.907S8.308 9.84 7.371 9.84c-.895 0-1.442-.725-1.442-1.914z"/>
                </svg>
                <input id="email" autocomplete="off" placeholder="Adres Gmail" class="input-field" type="email">
            </div>

            <div class="field" id="field-haslo">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2"/>
                </svg>
                <input id="haslo" placeholder="Hasło" class="input-field" type="password">
            </div>

            <div class="error-msg" id="err-empty">Wypełnij wszystkie pola!</div>
            <div class="error-msg" id="err-gmail">Wymagany adres @gmail.com!</div>
            <div class="error-msg" id="err-pass">Hasło musi mieć min. 6 znaków!</div>
            <div class="error-msg" id="err-server"></div>

            <button class="button-login" type="button" id="loginBtn" onclick="waliduj()">Zaloguj się</button>

            <div class="link-row">
                <a href="Resetuj.html">Resetuj hasło</a>
                <span style="color: #333;">|</span>
                <a href="zarejstruj.html">Stwórz konto</a>
            </div>

            <ul class="social-icons">
                <li class="icon-content">
                    <a href="#" data-social="discord" aria-label="Discord">
                        <div class="filled"></div>
                        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.545 2.907a13.2 13.2 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.2 12.2 0 0 0-3.658 0 8 8 0 0 0-.412-.833.05.05 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.04.04 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032q.003.022.021.037a13.3 13.3 0 0 0 3.995 2.02.05.05 0 0 0 .056-.019q.463-.63.818-1.329a.05.05 0 0 0-.01-.059l-.018-.011a9 9 0 0 1-1.248-.595.05.05 0 0 1-.02-.066l.015-.019q.127-.095.248-.195a.05.05 0 0 1 .051-.007c2.619 1.196 5.454 1.196 8.041 0a.05.05 0 0 1 .053.007q.121.1.248.195a.05.05 0 0 1-.004.085 8 8 0 0 1-1.249.594.05.05 0 0 0-.03.03.05.05 0 0 0 .003.041c.24.465.515.909.817 1.329a.05.05 0 0 0 .056.019 13.2 13.2 0 0 0 4.001-2.02.05.05 0 0 0 .021-.037c.334-3.451-.559-6.449-2.366-9.106a.03.03 0 0 0-.02-.019m-8.198 7.307c-.789 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.45.73 1.438 1.613 0 .888-.637 1.612-1.438 1.612m5.316 0c-.788 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.451.73 1.438 1.613 0 .888-.631 1.612-1.438 1.612"></path></svg>
                    </a>
                </li>
                <li class="icon-content">
                    <a href="#" data-social="tiktok" aria-label="TikTok">
                        <div class="filled"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M9 0h1.98c.144.715.54 1.617 1.235 2.512C12.895 3.389 13.797 4 15 4v2c-1.753 0-3.07-.814-4-1.829V11a5 5 0 1 1-5-5v2a3 3 0 1 0 3 3V0Z"/></svg>
                    </a>
                </li>
                <li class="icon-content">
                    <a href="#" data-social="instagram" aria-label="Instagram">
                        <div class="filled"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.9 3.9 0 0 0-1.417.923A3.9 3.9 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.9 3.9 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.9 3.9 0 0 0-.923-1.417A3.9 3.9 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599s.453.546.598.92c.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.5 2.5 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.5 2.5 0 0 1-.92-.598 2.5 2.5 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233s.008-2.388.046-3.231c.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92s.546-.453.92-.598c.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92m-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217m0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334"></path></svg>
                    </a>
                </li>
            </ul>
        </form>
    </div>

    <script>
        document.querySelectorAll('.icon-content a').forEach(a => {
            a.addEventListener('mouseenter', () => a.querySelector('.filled').style.height = '100%');
            a.addEventListener('mouseleave', () => a.querySelector('.filled').style.height = '0');
        });

        document.addEventListener('keydown', e => { if (e.key === 'Enter') waliduj(); });

        async function waliduj() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('haslo').value;
            const btn = document.getElementById('loginBtn');

            document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('widoczny'));
            document.querySelectorAll('.field').forEach(el => el.classList.remove('error'));

            let ok = true;

            if (!email || !pass) {
                document.getElementById('err-empty').classList.add('widoczny');
                if (!email) document.getElementById('field-email').classList.add('error');
                if (!pass) document.getElementById('field-haslo').classList.add('error');
                ok = false;
            } else {
                if (!email.endsWith('@gmail.com')) {
                    document.getElementById('err-gmail').classList.add('widoczny');
                    document.getElementById('field-email').classList.add('error');
                    ok = false;
                }
                if (pass.length < 6) {
                    document.getElementById('err-pass').classList.add('widoczny');
                    document.getElementById('field-haslo').classList.add('error');
                    ok = false;
                }
            }

            if (!ok) return;

            btn.disabled = true;
            btn.textContent = 'Logowanie...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();

                if (res.ok) {
                    btn.textContent = '✓ Zalogowano!';
                    btn.style.backgroundColor = '#2ecc71';
                    // Przekieruj do panelu po zalogowaniu:
                    // setTimeout(() => window.location.href = '/dashboard.html', 500);
                    setTimeout(() => alert(`✅ Zalogowano jako: ${email}`), 200);
                } else {
                    const errEl = document.getElementById('err-server');
                    errEl.textContent = data.error || 'Błąd logowania';
                    errEl.classList.add('widoczny');
                    document.getElementById('field-email').classList.add('error');
                    document.getElementById('field-haslo').classList.add('error');
                    btn.textContent = 'Zaloguj się';
                    btn.disabled = false;
                }
            } catch {
                document.getElementById('err-server').textContent = 'Błąd połączenia z serwerem';
                document.getElementById('err-server').classList.add('widoczny');
                btn.textContent = 'Zaloguj się';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
