<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja</title>
    <link rel="stylesheet" href="zarejstruj.css">
</head>
<body>
    <img class="bg-image" src="reset.png" alt="">

    <div class="form-wrapper">
        <form class="form">
            <p id="heading">Zarejestruj się</p>

            <div class="field" id="field-email">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.106 7.222c0-2.967-2.249-5.032-5.482-5.032-3.35 0-5.646 2.318-5.646 5.702 0 3.493 2.235 5.708 5.762 5.708.862 0 1.689-.123 2.304-.335v-.862c-.43.199-1.354.328-2.29.328-2.926 0-4.813-1.88-4.813-4.798 0-2.844 1.921-4.881 4.594-4.881 2.735 0 4.608 1.688 4.608 4.156 0 1.682-.554 2.769-1.416 2.769-.492 0-.772-.28-.772-.76V5.206H8.923v.834h-.11c-.266-.595-.881-.964-1.6-.964-1.4 0-2.378 1.162-2.378 2.823 0 1.737.957 2.906 2.379 2.906.8 0 1.415-.39 1.709-1.087h.11c.081.67.703 1.148 1.503 1.148 1.572 0 2.57-1.415 2.57-3.643zm-7.177.704c0-1.197.54-1.907 1.456-1.907.93 0 1.524.738 1.524 1.907S8.308 9.84 7.371 9.84c-.895 0-1.442-.725-1.442-1.914z"/>
                </svg>
                <input id="email" autocomplete="off" placeholder="Adres e-mail" class="input-field" type="email">
            </div>

            <div class="field" id="field-haslo">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2"/>
                </svg>
                <input id="haslo" autocomplete="off" placeholder="Hasło (min. 6 znaków)" class="input-field" type="password">
            </div>

            <div class="field" id="field-haslo2">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2"/>
                </svg>
                <input id="haslo2" autocomplete="off" placeholder="Powtórz hasło" class="input-field" type="password">
            </div>

            <div class="error-msg" id="blad-puste">Wypełnij wszystkie pola!</div>
            <div class="error-msg" id="blad-email">Podaj poprawny adres e-mail!</div>
            <div class="error-msg" id="blad-haslo-len">Hasło musi mieć minimum 6 znaków!</div>
            <div class="error-msg" id="blad-hasla">Hasła nie są takie same!</div>
            <div class="error-msg" id="blad-server"></div>

            <button class="button3" type="button" id="sendBtn" onclick="pokazKod()">Wyślij kod weryfikacyjny</button>

            <div class="kod-sekcja" id="kodSekcja">
                <div class="tekst">Wpisz kod który otrzymałeś na maila</div>
                <div class="code-field">
                    <input class="code-input" maxlength="1" type="text">
                    <input class="code-input" maxlength="1" type="text">
                    <input class="code-input" maxlength="1" type="text">
                    <input class="code-input" maxlength="1" type="text">
                    <input class="code-input" maxlength="1" type="text">
                </div>
                <div class="error-msg" id="blad-kod">Wpisz pełny kod weryfikacyjny!</div>
                <div class="error-msg" id="blad-kod-server"></div>
                <button class="button4" type="button" id="verifyBtn" onclick="sprawdzKod()">Utwórz konto</button>
            </div>

            <div class="link-row">
                <a href="index.html">Masz już konto? Zaloguj się</a>
            </div>
        </form>
    </div>

    <script>
        let pendingEmail = '';
        let pendingPassword = '';

        async function pokazKod() {
            const email = document.getElementById('email').value.trim();
            const haslo = document.getElementById('haslo').value;
            const haslo2 = document.getElementById('haslo2').value;
            const btn = document.getElementById('sendBtn');

            ['field-email','field-haslo','field-haslo2'].forEach(id =>
                document.getElementById(id).classList.remove('error'));
            ['blad-puste','blad-email','blad-haslo-len','blad-hasla','blad-server'].forEach(id =>
                document.getElementById(id).classList.remove('widoczny'));

            let ok = true;

            if (!email || !haslo || !haslo2) {
                if (!email) document.getElementById('field-email').classList.add('error');
                if (!haslo) document.getElementById('field-haslo').classList.add('error');
                if (!haslo2) document.getElementById('field-haslo2').classList.add('error');
                document.getElementById('blad-puste').classList.add('widoczny');
                ok = false;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email && !emailRegex.test(email)) {
                document.getElementById('field-email').classList.add('error');
                document.getElementById('blad-email').classList.add('widoczny');
                ok = false;
            }

            if (haslo && haslo.length < 6) {
                document.getElementById('field-haslo').classList.add('error');
                document.getElementById('blad-haslo-len').classList.add('widoczny');
                ok = false;
            }

            if (haslo && haslo2 && haslo !== haslo2) {
                document.getElementById('field-haslo2').classList.add('error');
                document.getElementById('blad-hasla').classList.add('widoczny');
                ok = false;
            }

            if (!ok) return;

            btn.disabled = true;
            btn.textContent = 'Wysyłanie...';

            try {
                const res = await fetch('/api/register/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: haslo })
                });
                const data = await res.json();

                if (res.ok) {
                    pendingEmail = email;
                    pendingPassword = haslo;
                    btn.textContent = '✓ Kod wysłany';

                    // Zablokuj pola
                    ['email','haslo','haslo2'].forEach(id => document.getElementById(id).disabled = true);
                    ['field-email','field-haslo','field-haslo2'].forEach(id =>
                        document.getElementById(id).style.opacity = '0.6');

                    // Pokaż sekcję kodu
                    const sekcja = document.getElementById('kodSekcja');
                    sekcja.classList.add('widoczny');
                    setupCodeInputs();
                } else {
                    const el = document.getElementById('blad-server');
                    el.textContent = data.error || 'Błąd serwera';
                    el.classList.add('widoczny');
                    btn.textContent = 'Wyślij kod weryfikacyjny';
                    btn.disabled = false;
                }
            } catch {
                document.getElementById('blad-server').textContent = 'Błąd połączenia z serwerem';
                document.getElementById('blad-server').classList.add('widoczny');
                btn.textContent = 'Wyślij kod weryfikacyjny';
                btn.disabled = false;
            }
        }

        function setupCodeInputs() {
            const inputs = document.querySelectorAll('.code-input');
            inputs.forEach((input, i) => {
                const nowy = input.cloneNode(true);
                input.parentNode.replaceChild(nowy, input);
            });
            const swieze = document.querySelectorAll('.code-input');
            swieze[0].focus();
            swieze.forEach((input, i) => {
                input.addEventListener('input', () => {
                    input.value = input.value.replace(/\D/g, '');
                    if (input.value.length === 1 && i < swieze.length - 1) swieze[i + 1].focus();
                });
                input.addEventListener('keydown', e => {
                    if (e.key === 'Backspace' && input.value === '' && i > 0) swieze[i - 1].focus();
                });
            });
        }

        async function sprawdzKod() {
            const inputs = document.querySelectorAll('.code-input');
            const bladKod = document.getElementById('blad-kod');
            const bladKodServer = document.getElementById('blad-kod-server');
            const btn = document.getElementById('verifyBtn');

            inputs.forEach(i => i.classList.remove('error'));
            bladKod.classList.remove('widoczny');
            bladKodServer.classList.remove('widoczny');

            let pelny = true;
            inputs.forEach(input => {
                if (input.value.trim() === '') { input.classList.add('error'); pelny = false; }
            });

            if (!pelny) { bladKod.classList.add('widoczny'); return; }

            const code = Array.from(inputs).map(i => i.value).join('');

            btn.disabled = true;
            btn.textContent = 'Tworzenie konta...';

            try {
                const res = await fetch('/api/register/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code })
                });
                const data = await res.json();

                if (res.ok) {
                    btn.textContent = '✓ Konto utworzone!';
                    btn.style.backgroundColor = '#2ecc71';
                    setTimeout(() => {
                        alert(`✅ Konto zostało utworzone!\nMożesz się teraz zalogować.`);
                        window.location.href = 'index.html';
                    }, 300);
                } else {
                    bladKodServer.textContent = data.error || 'Nieprawidłowy kod';
                    bladKodServer.classList.add('widoczny');
                    inputs.forEach(i => i.classList.add('error'));
                    btn.textContent = 'Utwórz konto';
                    btn.disabled = false;
                }
            } catch {
                bladKodServer.textContent = 'Błąd połączenia z serwerem';
                bladKodServer.classList.add('widoczny');
                btn.textContent = 'Utwórz konto';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
